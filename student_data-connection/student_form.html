<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন স্টুডেন্ট যোগ করুন</title>
    <style>
        .form-container { width: 50%; margin: 30px auto; font-family: Arial, sans-serif; padding: 20px; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn-submit { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        .btn-submit:hover { background-color: #45a049; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>স্টুডেন্ট ইনফরমেশন ফর্ম</h2>
    <!-- action="insert.php" দেওয়া হয়েছে কারণ দুটি ফাইলই একই ফোল্ডারে থাকবে -->
    <form action="insert.php" method="POST" enctype="multipart/form-data">
        
        <div class="form-group">
            <label>স্টুডেন্টের নাম (Student Name):</label>
            <input type="text" name="student_name" required>
        </div>

        <div class="form-group">
            <label>ক্লাসের নাম (Class Name):</label>
            <input type="text" name="class_name" placeholder="যেমন: Ten, Eight" required>
        </div>

        <div class="form-group">
            <label>সেকশন (Section):</label>
            <input type="text" name="section" placeholder="যেমন: A, B" required>
        </div>

        <div class="form-group">
            <label>ক্লাস রোল (Class Roll):</label>
            <input type="text" name="roll" placeholder="যেমন: 03, 12" required>
        </div>

        <div class="form-group">
            <label>ফোন নম্বর (Phone Number):</label>
            <input type="text" name="phone_number" required>
        </div>

        <div class="form-group">
            <label>পিতার নাম (Father's Name):</label>
            <input type="text" name="father_name" required>
        </div>

        <div class="form-group">
            <label>মাতার নাম (Mother's Name):</label>
            <input type="text" name="mother_name" required>
        </div>

        <div class="form-group">
            <label>ঠিকানা (Address):</label>
            <textarea name="student_address" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>স্টুডেন্টের ছবি (Student Image):</label>
            <input type="file" name="student_image" accept="image/*" required>
        </div>

        <button type="submit" class="btn-submit">ডাটা সংরক্ষণ করুন</button>
    </form>
</div>

</body>
</html>
